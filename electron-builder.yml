appId: com.lexio.app
productName: Lexio
copyright: Copyright © 2026 Lexio

directories:
  output: dist-build
  buildResources: public

files:
  - dist/**/*
  - dist-main/**/*
  - package.json
  - public/**/*

# Windows configuration
win:
  target: nsis
  icon: src/assets/icon.ico
  
nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: true
  shortcutName: Lexio

# Mac configuration
mac:
  target: dmg
  icon: src/assets/icon.ico
  category: public.app-category.education

# Linux configuration
linux:
  target: AppImage
  category: Education
  icon: src/assets/icon.ico

publish:
  provider: github
  owner: devnilobrasil
  repo: lexio
